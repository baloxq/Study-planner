<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Study Planner login page for the LAB3 MVP frontend project.">
  <title>Study Planner – Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth">
  <main class="auth-card">
    <div class="logo" style="margin:0 auto 14px auto">📘</div>
    <h1>Study Planner</h1>
    <p>Responsive academic planning MVP for students: tasks, subjects, calendar, profile, and interactive personalization.</p>
    <form onsubmit="handleLogin(event)">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="student@university.lt" required>
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" required>
      <div id="loginError" style="color:var(--danger);font-size:.88rem;display:none"></div>
      <button class="btn full" type="submit">Login to dashboard</button>
    </form>
    <script>
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('loginError');
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('studyPlannerToken', data.token);
          window.location.href = 'dashboard.html';
        } else {
          errEl.style.display = 'block';
          errEl.textContent = data.error || 'Login failed';
        }
      } catch {
        // Fallback for demo without server
        window.location.href = 'dashboard.html';
      }
    }
    </script>
    <div class="note">This frontend demonstrates the MVP graphical user interface defined for the Study Planner system.</div>
    <p style="margin-top:12px">Need an account? <a href="register.html"><strong>Register here</strong></a></p>
  </main>
  <script src="script.js"></script>
</body>
</html>
