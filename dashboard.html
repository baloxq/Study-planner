<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <aside class="sidebar">
    <div class="brand"><div class="logo">📘</div><span>Study Planner</span></div>
    <div class="menu">
      <a href="dashboard.html" class="active"><span>Dashboard</span></a>
      <a href="subjects.html" class=""><span>Subjects</span></a>
      <a href="tasks.html" class=""><span>Tasks</span></a>
      <a href="calendar.html" class=""><span>Calendar</span></a>
    </div>
    <div class="spacer"></div>
    <div class="logout"><a href="index.html">↩ Logout</a></div>
  </aside>
  <div class="main">

  <div class="header">
    <h1>Welcome back, Student!</h1>
    <p>Here's what you have on your plate today</p>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-header">
        <h3>Upcoming Tasks</h3>
        <button class="btn" onclick="toggleForm()">+ Add Task</button>
      </div>

      <div id="taskFormWrap" style="display:none">
        <form class="form" onsubmit="addTask(event)">
          <div class="full">
            <label>Task Title</label>
            <input id="f_title" placeholder="Enter task title" required>
          </div>
          <div>
            <label>Subject</label>
            <input id="f_subject" placeholder="e.g., Mathematics" required>
          </div>
          <div>
            <label>Priority</label>
            <select id="f_priority">
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="full">
            <label>Due Date</label>
            <input id="f_date" type="date" required>
          </div>
          <div class="form-actions full">
            <button class="btn" type="submit">Save Task</button>
            <button type="button" class="btn secondary" onclick="toggleForm()">Cancel</button>
          </div>
        </form>
      </div>

      <div id="taskList"></div>
    </div>
  </div>
  </div>
</div>
<script src="script.js"></script>

</body>
</html>
