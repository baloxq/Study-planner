<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Planner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

<aside>
    <h2>Study Planner</h2>
    <ul>
        <li class="active" onclick="showPage('dashboard', this)">Dashboard</li>
        <li onclick="showPage('tasks', this)">Tasks</li>
        <li onclick="showPage('calendar', this)">Calendar</li>
    </ul>
    <button class="logout" onclick="logout()">Logout</button>
</aside>

<main>

<div id="dashboard" class="page active-page">
    <h2>Welcome back, Student!</h2>

    <div class="card">
        <div class="card-header">
            <h3>Tasks</h3>
            <button onclick="toggleForm()">+ Add Task</button>
        </div>

        <div id="taskForm" class="hidden">
            <input id="title" placeholder="Task title">
            <select id="priority">
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>
            <button onclick="addTask()">Save</button>
        </div>

        <div id="taskList"></div>
    </div>
</div>

<div id="tasks" class="page">
    <h2>All Tasks</h2>
    <div id="taskListFull"></div>
</div>

<div id="calendar" class="page">
    <h2>April 2026</h2>
    <div class="calendar-grid">
        <script>
            for(let i=1;i<=30;i++){
                document.write(`<div class="day">${i}</div>`)
            }
        </script>
    </div>
</div>

</main>
</div>

<script src="script.js"></script>
</body>
</html>
