<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

<aside>
  <h2>Study Planner</h2>
  <ul>
    <li class="active" onclick="showPage('dashboard', this)">Dashboard</li>
    <li onclick="showPage('tasks', this)">Tasks</li>
    <li onclick="showPage('calendar', this)">Calendar</li>
  </ul>
  <button class="logout" onclick="logout()">Logout</button>
</aside>

<main>

<div id="dashboard" class="page active-page">
  <h1>Welcome back, Student!</h1>
  <p class="subtitle">Here's what you have on your plate today</p>

  <div class="card">
    <div class="card-header">
      <h3>Upcoming Tasks</h3>
      <button onclick="toggleForm()">+ Add Task</button>
    </div>

    <div id="taskForm" class="hidden">
      <input id="title" placeholder="Task Title">
      <button onclick="addTask()">Save</button>
    </div>

    <div id="taskList"></div>
  </div>
</div>

<div id="tasks" class="page">
  <h2>All Tasks</h2>
  <div id="taskListFull"></div>
</div>

<div id="calendar" class="page">
  <h2>April 2026</h2>
  <div class="calendar">
<div class="day">1</div>
<div class="day">2</div>
<div class="day">3</div>
<div class="day">4</div>
<div class="day">5</div>
<div class="day">6</div>
<div class="day">7</div>
<div class="day">8</div>
<div class="day">9</div>
<div class="day">10</div>
<div class="day">11</div>
<div class="day">12</div>
<div class="day">13</div>
<div class="day">14</div>
<div class="day">15</div>
<div class="day">16</div>
<div class="day">17</div>
<div class="day">18</div>
<div class="day">19</div>
<div class="day">20</div>
<div class="day">21</div>
<div class="day">22</div>
<div class="day">23</div>
<div class="day">24</div>
<div class="day">25</div>
<div class="day">26</div>
<div class="day">27</div>
<div class="day">28</div>
<div class="day">29</div>
<div class="day">30</div>

  </div>
</div>

</main>
</div>

<script src="script.js"></script>
</body>
</html>
