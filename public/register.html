<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Registration page for the Study Planner MVP.">
  <title>Study Planner – Register</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth">
  <main class="auth-card">
    <div class="logo" style="margin:0 auto 14px auto">📘</div>
    <h1>Create account</h1>
    <p>Sign up to manage lectures, homework, deadlines, exams, and personal study tasks in one clean interface.</p>
    <form onsubmit="handleRegister(event)">
      <label for="reg-name">Full name</label>
      <input id="reg-name" type="text" placeholder="Student name" required>
      <label for="reg-email">Email</label>
      <input id="reg-email" type="email" placeholder="student@university.lt" required>
      <label for="reg-password">Password</label>
      <input id="reg-password" type="password" placeholder="Create password" required>
      <div id="regMsg" style="font-size:.88rem;display:none"></div>
      <button class="btn full" type="submit">Register</button>
    </form>
    <script>
    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const msgEl = document.getElementById('regMsg');
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({name, email, password})
        });
        const data = await res.json();
        if (data.message) {
          // Auto-login after register
          const loginRes = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, password})
          });
          const loginData = await loginRes.json();
          if (loginData.token) {
            localStorage.setItem('studyPlannerToken', loginData.token);
          }
          window.location.href = 'dashboard.html';
        } else {
          msgEl.style.display = 'block';
          msgEl.style.color = 'var(--danger)';
          msgEl.textContent = data.error || 'Registration failed';
        }
      } catch {
        window.location.href = 'dashboard.html';
      }
    }
    </script>
    <p style="margin-top:12px"><a href="index.html">Back to login</a></p>
  </main>
  <script src="script.js"></script>
</body>
</html>
