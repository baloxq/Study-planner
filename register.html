<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Registration page for the Study Planner MVP.">
  <title>Study Planner – Register</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth">
  <main class="auth-card">
    <div class="logo" style="margin:0 auto 14px auto">📘</div>
    <h1>Create account</h1>
    <p>Sign up to manage lectures, homework, deadlines, exams, and personal study tasks in one clean interface.</p>
    <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
      <label for="reg-name">Full name</label>
      <input id="reg-name" type="text" placeholder="Student name" required>
      <label for="reg-email">Email</label>
      <input id="reg-email" type="email" placeholder="student@university.lt" required>
      <label for="reg-password">Password</label>
      <input id="reg-password" type="password" placeholder="Create password" required>
      <button class="btn full" type="submit">Register</button>
    </form>
    <p style="margin-top:12px"><a href="index.html">Back to login</a></p>
  </main>
  <script src="script.js"></script>
</body>
</html>
