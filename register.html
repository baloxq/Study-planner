<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Planner – Register</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="auth">
  <div class="auth-card">
    <div class="logo" style="margin:0 auto 10px auto">📘</div>
    <h1>Create account</h1>
    <p>Start planning your studies</p>
    <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
      <label>Email</label>
      <input type="email" required>
      <label>Password</label>
      <input type="password" required>
      <button class="btn" type="submit">Register</button>
    </form>
    <p style="margin-top:12px"><a href="index.html">Back to login</a></p>
  </div>
</body>
</html>
